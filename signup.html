<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6C63FF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Kairos">
    <link rel="apple-touch-icon" href="1000669890-Photoroom.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairos - Smart Student Planner | Sign Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css?v=4">
    <link rel="stylesheet" href="css/components.css?v=4">
    <link rel="stylesheet" href="css/pages/auth.css?v=4">
    <script>
        if (!sessionStorage.getItem('loadingShown')) {
            sessionStorage.setItem('loadingShown', 'true');
            window.location.href = 'loading.html?target=signup';
        }
    </script>
</head>
<body class="light-mode">
    <div class="auth-container">
        <div class="auth-bg">
            <div class="floating-shape shape-1"></div>
            <div class="floating-shape shape-2"></div>
            <div class="floating-shape shape-3"></div>
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="auth-logo-icon"><img src="1000669890-Photoroom.png" alt="Kairos Logo"></div>
                
                </div>
                <p class="auth-tagline">Act at the right time</p>
            </div>

            <div class="auth-header">
                <h1 class="auth-title">Create Account</h1>
                <p class="auth-subtitle">Start planning your academic journey</p>
            </div>

            <form class="auth-form" id="signupForm">
                <div class="auth-form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Your full name" required>
                </div>

                <div class="auth-form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
                </div>

                <div class="auth-form-group">
                    <label for="institution">Institution</label>
                    <input type="text" id="institution" name="institution" placeholder="Your college/university">
                </div>

                <div class="auth-form-group">
                    <label for="password">Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="password" name="password" placeholder="At least 6 characters" required>
                        <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('password')" title="Show/Hide password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
                        <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('confirmPassword')" title="Show/Hide password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-checkbox">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms" style="margin: 0;">I agree to the Terms of Service and Privacy Policy</label>
                </div>

                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary btn-lg">Create Account</button>
                </div>
            </form>

            <div class="auth-divider">Or sign up with</div>

            <div class="oauth-buttons">
                <button type="button" class="oauth-btn oauth-google" title="Sign up with Google">
                    <svg class="oauth-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#EA4335" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#4285F4" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span class="oauth-text">Google</span>
                </button>
            </div>

            <div class="motivational-quote">
                <p id="dailyQuote">"Success is the sum of small efforts repeated day in and day out." - Robert Collier</p>
            </div>

            <div class="auth-footer">
                <p>Already have an account? <a href="index.html">Sign In</a></p>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/app.js?v=4"></script>
    <script>
        const GOOGLE_CLIENT_ID = '211537278617-ioagbmritu95qf9n2ce49h5gqqkcfri2.apps.googleusercontent.com';

        function decodeJwt(token) {
            try { return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
            catch(e) { return null; }
        }

        function handleGoogleCredential(response) {
            const payload = decodeJwt(response.credential);
            if (!payload) { showToast('Google sign-in failed', 'error'); return; }
            localStorage.setItem('kairos_user', JSON.stringify({
                email: payload.email,
                name: payload.name,
                avatarUrl: payload.picture,
                google_id: payload.sub,
                logged_in: true,
                created_at: new Date().toISOString()
            }));
            if (!localStorage.getItem('kairos_assignments')) initializeMockData();
            showToast('Welcome to Kairos, ' + payload.name + '!', 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 800);
        }

        window.addEventListener('load', () => {
            if (typeof google !== 'undefined') {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleCredential,
                    auto_select: false
                });
            }
        });

        document.querySelector('.oauth-google').addEventListener('click', () => {
            if (typeof google === 'undefined') { showToast('Google Sign-In not loaded yet, try again', 'warning'); return; }
            google.accounts.id.prompt((notification) => {
                if (notification.isSkippedMoment() || notification.isDismissedMoment()) {
                    const tmp = document.createElement('div');
                    tmp.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;background:#fff;padding:20px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.2)';
                    tmp.innerHTML = '<p style="margin-bottom:12px;font-family:Inter,sans-serif;font-size:14px;text-align:center">Sign up with Google</p><div id="gBtnContainer"></div><button onclick="this.parentElement.remove()" style="margin-top:10px;width:100%;padding:8px;border:none;border-radius:8px;background:#f3f4f6;cursor:pointer;font-size:13px">Cancel</button>';
                    document.body.appendChild(tmp);
                    google.accounts.id.renderButton(document.getElementById('gBtnContainer'), { theme:'outline', size:'large', width:280 });
                }
            });
        });

        // --- OTP Verification Logic ---
        let pendingUser = null;

        document.getElementById('signupForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const institution = document.getElementById('institution').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validation
            if (password.length < 6) {
                showToast('Password must be at least 6 characters', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showToast('Passwords do not match', 'error');
                return;
            }

            // Save user data temporarily
            pendingUser = {
                email: email,
                name: fullname,
                institution: institution,
                logged_in: true,
                created_at: new Date().toISOString()
            };

            const submitBtn = e.target.querySelector('button[type="submit"]');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Sending Code...';

            try {
                const API_BASE = (typeof KAIROS_API_BASE !== 'undefined') ? KAIROS_API_BASE : 'http://localhost:5000/api';
                const res = await fetch(`${API_BASE}/auth/send-otp`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ email: email })
                });

                const data = await res.json();
                submitBtn.disabled = false;
                submitBtn.innerText = 'Create Account';

                if (res.ok) {
                    showToast('Verification code sent to your email', 'info');
                    showOtpModal(email);
                } else {
                    showToast(data.error || 'Failed to send OTP. Is the backend running?', 'error');
                }
            } catch (err) {
                console.error("OTP Error:", err);
                submitBtn.disabled = false;
                submitBtn.innerText = 'Create Account';
                showToast('Network error while sending OTP.', 'error');
            }
        });

        function showOtpModal(email) {
            // Create modal if it doesn't exist
            let modal = document.getElementById('otpModal');
            if (!modal) {
                modal = document.createElement('div');
                modal.id = 'otpModal';
                modal.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);';
                
                modal.innerHTML = `
                    <div style="background:var(--card-bg, #fff);padding:30px;border-radius:16px;width:90%;max-width:400px;box-shadow:0 10px 40px rgba(0,0,0,0.2);text-align:center;">
                        <i class="fas fa-envelope-open-text" style="font-size:3rem;color:var(--primary, #6C63FF);margin-bottom:15px;"></i>
                        <h2 style="margin-bottom:10px;font-family:var(--font-primary);color:var(--text, #333);">Verify Your Email</h2>
                        <p style="color:var(--text-secondary, #666);font-size:0.9rem;margin-bottom:20px;">We sent a 6-digit code to <b id="otpEmailDisplay"></b>. Enter it below to complete registration.</p>
                        
                        <input type="text" id="otpInput" placeholder="Enter 6-digit code" style="width:100%;padding:12px;border:1px solid var(--border, #ddd);border-radius:8px;font-size:1.2rem;text-align:center;letter-spacing:4px;margin-bottom:20px;font-weight:600;" maxlength="6">
                        
                        <button id="verifyOtpBtn" style="width:100%;padding:12px;background:var(--primary, #6C63FF);color:#fff;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin-bottom:10px;transition:0.2s;">Verify & Register</button>
                        <button id="cancelOtpBtn" style="width:100%;padding:12px;background:transparent;color:var(--text-secondary, #666);border:none;cursor:pointer;font-size:0.9rem;">Cancel</button>
                    </div>
                `;
                document.body.appendChild(modal);

                document.getElementById('cancelOtpBtn').addEventListener('click', () => {
                    modal.style.display = 'none';
                });

                document.getElementById('verifyOtpBtn').addEventListener('click', async () => {
                    const otp = document.getElementById('otpInput').value.trim();
                    if (!otp) {
                        showToast('Please enter the code', 'warning');
                        return;
                    }

                    const btn = document.getElementById('verifyOtpBtn');
                    btn.disabled = true;
                    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verifying...';

                    try {
                        const API_BASE = (typeof KAIROS_API_BASE !== 'undefined') ? KAIROS_API_BASE : 'http://localhost:5000/api';
                        const res = await fetch(`${API_BASE}/auth/verify-otp`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({ email: pendingUser.email, otp: otp })
                        });

                        const data = await res.json();
                        btn.disabled = false;
                        btn.innerText = 'Verify & Register';

                        if (res.ok) {
                            // Success! Save user and redirect
                            localStorage.setItem('kairos_user', JSON.stringify(pendingUser));
                            modal.style.display = 'none';
                            showToast('Email verified! Account created successfully.', 'success');
                            setTimeout(() => {
                                window.location.href = 'dashboard.html';
                            }, 1500);
                        } else {
                            showToast(data.error || 'Invalid code. Try again.', 'error');
                        }
                    } catch (err) {
                        console.error("Verify Error:", err);
                        btn.disabled = false;
                        btn.innerText = 'Verify & Register';
                        showToast('Network error during verification.', 'error');
                    }
                });
            }
            
            document.getElementById('otpEmailDisplay').innerText = email;
            document.getElementById('otpInput').value = '';
            modal.style.display = 'flex';
            setTimeout(() => document.getElementById('otpInput').focus(), 100);
        }

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('kairos_user') || '{}');
            if (user.logged_in) {
                window.location.href = 'dashboard.html';
            }
        });

    </script>
</body>
</html>
