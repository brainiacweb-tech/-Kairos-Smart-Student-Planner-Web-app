<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairos - Assignments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages/dashboard.css">
    <link rel="stylesheet" href="css/pages/assignments.css">
</head>
<body class="dark-mode">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header" onclick="window.location.href='dashboard.html'">
                <div class="sidebar-logo-icon"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="logoGrad2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" /><stop offset="100%" style="stop-color:#4c3dd9;stop-opacity:1" /></linearGradient></defs><circle cx="50" cy="50" r="48" fill="url(#logoGrad2)" opacity="0.15"/><path d="M 35 30 L 65 30 L 70 50 L 65 70 L 35 70 L 30 50 Z" fill="none" stroke="#6C63FF" stroke-width="3" stroke-linejoin="round"/><circle cx="50" cy="50" r="8" fill="#6C63FF"/></svg></div>
                <div class="sidebar-logo-text">Kairos</div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><span class="nav-icon"><i class="fas fa-chart-pie"></i></span><span class="nav-label">Dashboard</span></a>
                <a href="assignments.html" class="nav-item active"><span class="nav-icon"><i class="fas fa-tasks"></i></span><span class="nav-label">Assignments</span></a>
                <a href="planner.html" class="nav-item"><span class="nav-icon"><i class="fas fa-calendar"></i></span><span class="nav-label">Planner</span></a>
                <a href="timetable.html" class="nav-item"><span class="nav-icon"><i class="fas fa-table"></i></span><span class="nav-label">Timetable</span></a>
                <a href="analytics.html" class="nav-item"><span class="nav-icon"><i class="fas fa-chart-bar"></i></span><span class="nav-label">Analytics</span></a>
                <a href="gpa-calculator.html" class="nav-item"><span class="nav-icon"><i class="fas fa-calculator"></i></span><span class="nav-label">GPA Calc</span></a>
                <a href="lecture-tools.html" class="nav-item"><span class="nav-icon"><i class="fas fa-microphone"></i></span><span class="nav-label">Lecture Tools</span></a>
                <a href="pdf-tools.html" class="nav-item"><span class="nav-icon"><i class="fas fa-file-pdf"></i></span><span class="nav-label">PDF Tools</span></a>
                <a href="settings.html" class="nav-item"><span class="nav-icon"><i class="fas fa-cog"></i></span><span class="nav-label">Settings</span></a>
            </nav>
            <div class="sidebar-footer"><button class="nav-item" onclick="logout()"><span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span><span class="nav-label">Logout</span></button></div>
        </aside>
        <div style="flex: 1; display: flex; flex-direction: column;">
            <nav class="navbar">
                <div class="navbar-left">
                    <button class="navbar-toggle"><i class="fas fa-bars"></i></button>
                    <h1 class="navbar-title">Assignments</h1>
                </div>
                <div class="navbar-right">
                    <button class="theme-toggle dark" onclick="toggleTheme()"></button>
                    <button class="btn-icon" onclick="openNotificationPanel()"><i class="fas fa-bell"></i><span class="notification-badge">0</span></button>
                    <div class="user-avatar">👤</div>
                </div>
            </nav>
            <main class="main-content" style="max-width: 1400px; width: 100%;">
                <div class="assignments-header">
                    <h1 class="assignments-title">Assignments</h1>
                    <button class="btn btn-primary add-assignment-btn" onclick="openAddModal()">
                        <i class="fas fa-plus"></i> Add Assignment
                    </button>
                </div>
                <div class="filter-bar">
                    <div class="filter-group">
                        <label>Search</label>
                        <input type="text" id="searchInput" placeholder="Search assignments..." onkeyup="applyFilters()">
                    </div>
                    <div class="filter-group">
                        <label>Course</label>
                        <select id="courseFilter" onchange="applyFilters()"><option value="">All Courses</option></select>
                    </div>
                    <div class="filter-group">
                        <label>Priority</label>
                        <select id="priorityFilter" onchange="applyFilters()">
                            <option value="">All Priorities</option>
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Status</label>
                        <select id="statusFilter" onchange="applyFilters()">
                            <option value="">All Statuses</option>
                            <option value="pending">Pending</option>
                            <option value="in-progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <div class="filter-actions">
                        <button class="btn-reset" onclick="resetFilters()">Reset</button>
                    </div>
                </div>
                <div class="view-toggle">
                    <button class="active" onclick="setView('list')"><i class="fas fa-list"></i> List</button>
                    <button onclick="setView('grid')"><i class="fas fa-th"></i> Grid</button>
                </div>
                <div id="assignmentsContainer"></div>
            </main>
        </div>
    </div>
    <div class="drawer" id="addAssignmentDrawer">
        <div class="drawer-header">
            <h2 class="drawer-header-title">Add Assignment</h2>
            <button class="modal-close" onclick="closeDrawer('addAssignmentDrawer')"><i class="fas fa-times"></i></button>
        </div>
        <div class="drawer-body">
            <form id="assignmentForm" onsubmit="handleAddAssignment(event)">
                <div class="assignment-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Title *</label>
                            <input type="text" id="assignTitle" required>
                        </div>
                        <div class="form-group">
                            <label>Course Code</label>
                            <input type="text" id="assignCourse">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Due Date *</label>
                            <input type="date" id="assignDueDate" required>
                        </div>
                        <div class="form-group">
                            <label>Due Time</label>
                            <input type="time" id="assignDueTime">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <div class="priority-toggle">
                            <button type="button" class="priority-btn low active" onclick="setPriority('low')">Low</button>
                            <button type="button" class="priority-btn medium" onclick="setPriority('medium')">Medium</button>
                            <button type="button" class="priority-btn high" onclick="setPriority('high')">High</button>
                        </div>
                        <input type="hidden" id="assignPriority" value="low">
                    </div>
                    <div class="form-group">
                        <label>Estimated Hours: <span id="hoursValue">2</span></label>
                        <div class="slider-container">
                            <input type="range" id="assignHours" min="0.5" max="24" step="0.5" value="2" onchange="updateHoursDisplay()">
                            <span class="slider-value" id="hoursDisplay">2h</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="assignStatus">
                            <option value="pending">Pending</option>
                            <option value="in-progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group full">
                        <label>Notes</label>
                        <textarea id="assignNotes" placeholder="Add any notes..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeDrawer('addAssignmentDrawer')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Assignment</button>
                </div>
            </form>
        </div>
    </div>
    <button class="fab" onclick="openAddModal()"><i class="fas fa-plus"></i></button>
    <div class="toast-container" id="toastContainer"></div>
    <script src="js/app.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/assignments.js"></script>
</body>
</html>
