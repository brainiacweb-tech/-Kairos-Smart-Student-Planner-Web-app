<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairos - Assignments</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages/dashboard.css">
    <link rel="stylesheet" href="css/pages/assignments.css">
</head>
<body class="light-mode">
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="sidebar-header" onclick="window.location.href='dashboard.html'">
                <div class="sidebar-logo-icon"><img src="1000669890-Photoroom.png" alt="Kairos Logo"></div>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <span class="nav-icon"><i class="fas fa-chart-pie"></i></span>
                    <span class="nav-label">Dashboard</span>
                </a>
                <a href="assignments.html" class="nav-item active">
                    <span class="nav-icon"><i class="fas fa-tasks"></i></span>
                    <span class="nav-label">Assignments</span>
                </a>
                <a href="planner.html" class="nav-item">
                    <span class="nav-icon"><i class="fas fa-calendar"></i></span>
                    <span class="nav-label">Planner</span>
                </a>
                <a href="timetable.html" class="nav-item">
                    <span class="nav-icon"><i class="fas fa-table"></i></span>
                    <span class="nav-label">Timetable</span>
                </a>
                <a href="analytics.html" class="nav-item">
                    <span class="nav-icon"><i class="fas fa-chart-bar"></i></span>
                    <span class="nav-label">Analytics</span>
                </a>
                <a href="gpa-calculator.html" class="nav-item">
                    <span class="nav-icon"><i class="fas fa-calculator"></i></span>
                    <span class="nav-label">GPA Calc</span>
                </a>
                <a href="cwa-to-gpa.html" class="nav-item">
                    <span class="nav-icon"><i class="fas fa-exchange-alt"></i></span>
                    <span class="nav-label">CWA→GPA</span>
                </a>
                <a href="lecture-tools.html" class="nav-item">
                    <span class="nav-icon"><i class="fas fa-microphone"></i></span>
                    <span class="nav-label">Lecture Tools</span>
                </a>
                <a href="pdf-tools.html" class="nav-item">
                    <span class="nav-icon"><i class="fas fa-file-pdf"></i></span>
                    <span class="nav-label">PDF Tools</span>
                </a>
                <a href="word-editor.html" class="nav-item">
                    <span class="nav-icon"><i class="fas fa-file-word"></i></span>
                    <span class="nav-label">Word</span>
                </a>
                <a href="excel-editor.html" class="nav-item">
                    <span class="nav-icon"><i class="fas fa-file-excel"></i></span>
                    <span class="nav-label">Excel</span>
                </a>
                <a href="powerpoint-editor.html" class="nav-item">
                    <span class="nav-icon"><i class="fas fa-file-powerpoint"></i></span>
                    <span class="nav-label">PowerPoint</span>
                </a>
                <a href="settings.html" class="nav-item">
                    <span class="nav-icon"><i class="fas fa-cog"></i></span>
                    <span class="nav-label">Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <button class="nav-item" onclick="logout()">
                    <span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span>
                    <span class="nav-label">Logout</span>
                </button>
            </div>
        </aside>
        <div style="flex: 1; display: flex; flex-direction: column;">
            <nav class="navbar">
                <div class="navbar-left">
                    <h1 class="navbar-title">Assignments</h1>
                </div>
                <div class="navbar-right">
                    <button class="btn-icon" onclick="openNotificationPanel()" title="Notifications">
                        <i class="fas fa-bell"></i>
                    </button>
                    <!-- Profile Dropdown Menu -->
                    <div class="user-profile-menu">
                        <button class="user-profile-btn" onclick="toggleProfileMenu()" title="User Profile">
                            <div class="user-profile-avatar">👤</div>
                            <span class="user-profile-name" id="userNameDisplay">User</span>
                            <i class="fas fa-chevron-down"></i>
                        </button>
                        <div class="user-profile-dropdown" id="profileDropdown">
                            <div class="user-profile-header">
                                <div class="user-profile-avatar">👤</div>
                                <div>
                                    <div class="user-profile-title" id="userNameDisplay2">User</div>
                                    <div class="user-profile-subtitle" id="userEmailDisplay">user@example.com</div>
                                </div>
                            </div>
                            <a href="settings.html#profile" class="user-profile-item">
                                <i class="fas fa-user"></i> Profile
                            </a>
                            <a href="settings.html#account" class="user-profile-item">
                                <i class="fas fa-lock"></i> Account
                            </a>
                            <a href="settings.html" class="user-profile-item">
                                <i class="fas fa-cog"></i> Settings
                            </a>
                            <div class="user-profile-divider"></div>
                            <button class="user-profile-item danger" onclick="logout()">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </button>
                        </div>
                    </div>
                </div>
            </nav>
            <main class="main-content" style="max-width: 1400px; width: 100%;">
                <div class="assignments-container">
                    <div class="assignments-content">
                        <div class="assignments-header">
                            <h1 class="assignments-title">Assignments</h1>
                            <button class="btn btn-primary add-assignment-btn" onclick="openAddModal()">
                                <i class="fas fa-plus"></i> Add Assignment
                            </button>
                        </div>
                        <div class="filter-bar">
                            <div class="filter-group">
                                <label>Search</label>
                                <input type="text" id="searchInput" placeholder="Search assignments..." onkeyup="applyFilters()">
                            </div>
                            <div class="filter-group">
                                <label>Course</label>
                                <input type="text" id="courseFilter" placeholder="Enter course code..." onkeyup="applyFilters()">
                            </div>
                            <div class="filter-group">
                                <label>Priority</label>
                                <select id="priorityFilter" onchange="applyFilters()">
                                    <option value="">All Priorities</option>
                                    <option value="high">High</option>
                                    <option value="medium">Medium</option>
                                    <option value="low">Low</option>
                                </select>
                            </div>
                            <div class="filter-group">
                                <label>Status</label>
                                <select id="statusFilter" onchange="applyFilters()">
                                    <option value="">All Statuses</option>
                                    <option value="pending">Pending</option>
                                    <option value="in-progress">In Progress</option>
                                    <option value="completed">Completed</option>
                                </select>
                            </div>
                            <div class="filter-actions">
                                <button class="btn-reset" onclick="resetFilters()">Reset</button>
                            </div>
                        </div>
                        <div class="view-toggle">
                            <button class="active" onclick="setView('list')"><i class="fas fa-list"></i> List</button>
                            <button onclick="setView('grid')"><i class="fas fa-th"></i> Grid</button>
                        </div>
                        <div id="assignmentsContainer"></div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- ADD ASSIGNMENT DRAWER -->
    <div class="drawer" id="addAssignmentDrawer">
        <div class="drawer-header">
            <h2 class="drawer-header-title">Add Assignment</h2>
            <button class="modal-close" onclick="closeDrawer('addAssignmentDrawer')"><i class="fas fa-times"></i></button>
        </div>
        <div class="drawer-body">
            <form id="assignmentForm" onsubmit="handleAddAssignment(event)">
                <div class="assignment-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Title *</label>
                            <input type="text" id="assignTitle" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Course Code</label>
                            <input type="text" id="assignCourse" placeholder="e.g., ACC301">
                        </div>
                        <div class="form-group">
                            <label>Course Name</label>
                            <input type="text" id="assignCourseName" placeholder="e.g., Financial Accounting">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Due Date *</label>
                            <input type="date" id="assignDueDate" required>
                        </div>
                        <div class="form-group">
                            <label>Due Time</label>
                            <input type="time" id="assignDueTime">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Priority</label>
                        <div class="priority-toggle">
                            <button type="button" class="priority-btn low active" onclick="setPriority('low')">Low</button>
                            <button type="button" class="priority-btn medium" onclick="setPriority('medium')">Medium</button>
                            <button type="button" class="priority-btn high" onclick="setPriority('high')">High</button>
                        </div>
                        <input type="hidden" id="assignPriority" value="low">
                    </div>
                    <div class="form-group">
                        <label>Estimated Hours: <span id="hoursValue">2</span></label>
                        <div class="slider-container">
                            <input type="range" id="assignHours" min="0.5" max="24" step="0.5" value="2" onchange="updateHoursDisplay()">
                            <span class="slider-value" id="hoursDisplay">2h</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="assignStatus">
                            <option value="pending">Pending</option>
                            <option value="in-progress">In Progress</option>
                            <option value="completed">Completed</option>
                        </select>
                    </div>
                    <div class="form-group full">
                        <label>Notes</label>
                        <textarea id="assignNotes" placeholder="Add any notes..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeDrawer('addAssignmentDrawer')">Cancel</button>
                    <button type="submit" class="btn btn-primary">Add Assignment</button>
                </div>
            </form>
        </div>
    </div>

    <!-- FLOATING ACTION BUTTON -->
    <button class="fab" onclick="openAddModal()"><i class="fas fa-plus"></i></button>

    <!-- TOAST NOTIFICATIONS -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- SCRIPTS -->
    <script src="js/app.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/assignments.js"></script>
</body>
</html>
