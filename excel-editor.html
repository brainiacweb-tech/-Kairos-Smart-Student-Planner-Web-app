<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairos - Excel Sheet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; display: flex; flex-direction: column; background: white; }
        .toolbar { background: white; border-bottom: 1px solid #ddd; padding: 8px 12px; display: flex; gap: 6px; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); flex-wrap: wrap; }
        .toolbar button { padding: 6px 10px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 3px; font-size: 13px; transition: all 0.2s; white-space: nowrap; }
        .toolbar button:hover { background: #f5f5f5; border-color: #999; }
        .toolbar select { padding: 6px 8px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 3px; font-size: 13px; font-family: inherit; }
        .toolbar select:hover { background: #f5f5f5; }
        .color-picker { width: 30px; height: 30px; padding: 2px; border: 1px solid #ddd; border-radius: 3px; cursor: pointer; }
        .separator { width: 1px; height: 20px; background: #ddd; margin: 0 3px; display: none; }
        .toolbar-menu { display: none; position: absolute; top: 45px; left: 12px; background: white; border: 1px solid #ddd; border-radius: 3px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 1000; min-width: 160px; }
        .toolbar-menu.open { display: block; }
        .toolbar-menu button { display: block; width: 100%; text-align: left; padding: 8px 12px; border: none; background: none; cursor: pointer; font-size: 13px; }
        .toolbar-menu button:hover { background: #f5f5f5; }
        .toolbar-menu .sep { border-top: 1px solid #eee; margin: 3px 0; }
        .hamburger { display: none; background: none; border: none; font-size: 16px; cursor: pointer; color: #333; }
        .content { flex: 1; overflow: auto; background: white; }
        .spreadsheet { display: inline-block; background: white; margin: 0; border-radius: 0; box-shadow: none; }
        table { border-collapse: collapse; font-family: 'Segoe UI', sans-serif; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: left; font-size: 12px; }
        th { background: #f5f5f5; color: #333; font-weight: 600; }
        td { background: white; }
        input { width: 100%; border: none; padding: 2px; font-size: 12px; font-family: inherit; }
        input:focus { outline: 2px solid #4CAF50; background: #fff9c4; }
        td { background: white; }
        input { width: 100%; border: none; padding: 0; font-size: 12px; }
        input:focus { outline: 2px solid #4CAF50; background: #fff9c4; }
        .row-header { background: #f0f0f0; font-weight: 600; text-align: center; font-size: 12px; }
        @media (max-width: 768px) {
            .toolbar { padding: 10px; }
            .toolbar button { padding: 6px 10px; font-size: 12px; }
            .toolbar button span { display: none; }
            .separator { display: none; }
            .hamburger { display: block; }
            th, td { padding: 6px; font-size: 11px; }
            input { font-size: 11px; }
            .spreadsheet { margin: 8px; }
        }
        @media (max-width: 480px) {
            .toolbar { padding: 8px; }
            .toolbar button { padding: 6px 8px; font-size: 11px; }
            th, td { padding: 4px; font-size: 10px; }
            input { font-size: 10px; }
            .spreadsheet { margin: 4px; }
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button class="hamburger" onclick="toggleToolMenu()"><i class="fas fa-bars"></i></button>
        <button onclick="goBack()"><i class="fas fa-arrow-left"></i> Dashboard</button>
        <div class="separator"></div>
        <button onclick="newSheet()" title="New"><i class="fas fa-file"></i></button>
        <button onclick="saveSheet()" title="Save"><i class="fas fa-save"></i></button>
        <button onclick="downloadSheet()" title="Download CSV"><i class="fas fa-download"></i></button>
        <div class="separator"></div>
        <select id="fontFamily" onchange="setFontForCell()" title="Font Family">
            <option value="">Font</option>
            <option value="Arial">Arial</option>
            <option value="'Times New Roman'">Times New Roman</option>
            <option value="Georgia">Georgia</option>
            <option value="Courier New">Courier New</option>
            <option value="Verdana">Verdana</option>
        </select>
        <select id="fontSize" onchange="setFontSizeForCell()" title="Font Size">
            <option value="">Size</option>
            <option value="10px">10</option>
            <option value="12px">12</option>
            <option value="14px">14</option>
            <option value="16px">16</option>
            <option value="18px">18</option>
        </select>
        <input type="color" id="fontColor" class="color-picker" title="Font Color" onchange="setFontColorForCell()">
        <div class="separator"></div>
        <button onclick="addRow()" title="Add Row"><i class="fas fa-plus"></i> Row</button>
        <button onclick="addColumn()" title="Add Column"><i class="fas fa-plus"></i> Column</button>
        <div id="toolMenu" class="toolbar-menu">
            <button onclick="goBack()"><i class="fas fa-arrow-left"></i> Dashboard</button>
            <button onclick="newSheet()"><i class="fas fa-file"></i> New</button>
            <button onclick="saveSheet()"><i class="fas fa-save"></i> Save</button>
            <button onclick="downloadSheet()"><i class="fas fa-download"></i> Download</button>
            <div class="sep"></div>
            <button onclick="addRow()"><i class="fas fa-plus"></i> Add Row</button>
            <button onclick="addColumn()"><i class="fas fa-plus"></i> Add Column</button>
            <div class="sep"></div>
            <button onclick="toggleToolMenu()"><i class="fas fa-times"></i> Close</button>
        </div>
    </div>
    
    <div class="content">
        <div class="spreadsheet">
            <table id="sheet"></table>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const ROWS = 15, COLS = 10;
        let data = [];

        function toggleToolMenu() { 
            document.getElementById('toolMenu').classList.toggle('open'); 
        }

        function init() {
            for (let i = 0; i < ROWS; i++) {
                data[i] = new Array(COLS).fill('');
            }
            render();
        }

        function render() {
            const table = document.getElementById('sheet');
            table.innerHTML = '';
            
            // Headers
            const header = document.createElement('tr');
            header.appendChild(document.createElement('th')).textContent = '';
            for (let i = 0; i < COLS; i++) {
                const th = document.createElement('th');
                th.textContent = String.fromCharCode(65 + i);
                header.appendChild(th);
            }
            table.appendChild(header);
            
            // Rows
            for (let r = 0; r < data.length; r++) {
                const tr = document.createElement('tr');
                const rh = document.createElement('td');
                rh.className = 'row-header';
                rh.textContent = r + 1;
                tr.appendChild(rh);
                
                for (let c = 0; c < COLS; c++) {
                    const td = document.createElement('td');
                    const input = document.createElement('input');
                    input.value = data[r][c];
                    input.onchange = () => { data[r][c] = input.value; };
                    td.appendChild(input);
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }
        }

        function goBack() { window.location.href = 'dashboard.html'; }
        function newSheet() { if (confirm('Create new sheet?')) { init(); toggleToolMenu(); } }
        function saveSheet() { localStorage.setItem('excel_sheet', JSON.stringify(data)); showToast('Saved!', 'success'); toggleToolMenu(); }
        function downloadSheet() {
            let csv = data.map(row => row.map(cell => `"${cell}"`).join(',')).join('\n');
            const blob = new Blob([csv], {type:'text/csv'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'sheet.csv';
            a.click();
            toggleToolMenu();
        }
        function addRow() { data.push(new Array(COLS).fill('')); render(); toggleToolMenu(); }
        function addColumn() { data.forEach(row => row.push('')); render(); toggleToolMenu(); }
        function setFontForCell() { 
            const family = document.getElementById('fontFamily').value; 
            const inputs = document.querySelectorAll('input:focus');
            inputs.forEach(inp => inp.style.fontFamily = family);
        }
        function setFontSizeForCell() { 
            const size = document.getElementById('fontSize').value; 
            const inputs = document.querySelectorAll('input:focus');
            inputs.forEach(inp => inp.style.fontSize = size);
        }
        function setFontColorForCell() { 
            const color = document.getElementById('fontColor').value; 
            const inputs = document.querySelectorAll('input:focus');
            inputs.forEach(inp => inp.style.color = color);
        }

        window.addEventListener('load', () => {
            const saved = localStorage.getItem('excel_sheet');
            if (saved) {
                try {
                    data = JSON.parse(saved);
                } catch (e) {
                    init();
                }
            } else {
                init();
            }
            render();
        });

        document.addEventListener('click', (e) => {
            const menu = document.getElementById('toolMenu');
            const hamburger = document.querySelector('.hamburger');
            if (!menu.contains(e.target) && !hamburger.contains(e.target)) {
                menu.classList.remove('open');
            }
        });
    </script>
</body>
</html>
