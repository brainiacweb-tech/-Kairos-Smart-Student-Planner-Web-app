<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6C63FF">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Kairos">
    <link rel="apple-touch-icon" href="1000669890-Photoroom.png">
    <link rel="icon" type="image/png" href="1000669890-Photoroom.png">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Kairos">
    <meta property="og:title" content="Kairos - Smart Student Planner">
    <meta property="og:description" content="The all-in-one academic planner for university students. Manage assignments, timetable, notes, recordings, and more.">
    <meta property="og:image" content="https://kairos-smart-student-planner-web-app-cs5n.onrender.com/1000669890-Photoroom.png">
    <meta property="og:url" content="https://kairos-smart-student-planner-web-app-cs5n.onrender.com">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Kairos - Smart Student Planner">
    <meta name="twitter:description" content="The all-in-one academic planner for university students.">
    <meta name="twitter:image" content="https://kairos-smart-student-planner-web-app-cs5n.onrender.com/1000669890-Photoroom.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairos - Loading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0c29;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Gradient background */
        .bg-gradient {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            z-index: 0;
        }

        /* Floating orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            animation: orbFloat var(--dur, 8s) ease-in-out infinite;
            animation-delay: var(--delay, 0s);
        }

        .orb-1 {
            width: 500px; height: 500px;
            background: #6c63ff;
            top: -150px; left: -150px;
            --dur: 10s;
        }

        .orb-2 {
            width: 400px; height: 400px;
            background: #2ed573;
            bottom: -120px; right: -100px;
            --dur: 12s;
            --delay: -4s;
        }

        .orb-3 {
            width: 300px; height: 300px;
            background: #a855f7;
            top: 40%; left: 60%;
            --dur: 9s;
            --delay: -2s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%       { transform: translate(30px, -30px) scale(1.05); }
            66%       { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* Subtle grid overlay */
        .grid-overlay {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
        }

        /* Main container */
        .loading-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            animation: fadeIn 0.6s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Logo area */
        .logo-area {
            position: relative;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 36px;
        }

        /* Spinning gradient ring */
        .ring-outer {
            position: absolute;
            inset: -14px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #6c63ff, #a855f7, #2ed573, #6c63ff);
            animation: spin 2.4s linear infinite;
            padding: 3px;
        }

        .ring-outer::before {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: #1a1738;
        }

        /* Pulse ring */
        .ring-pulse {
            position: absolute;
            inset: -22px;
            border-radius: 50%;
            border: 2px solid rgba(108, 99, 255, 0.3);
            animation: pulse 2s ease-in-out infinite;
        }

        .ring-pulse-2 {
            position: absolute;
            inset: -36px;
            border-radius: 50%;
            border: 1.5px solid rgba(108, 99, 255, 0.15);
            animation: pulse 2s ease-in-out infinite 0.4s;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1);   opacity: 0.5; }
            50%       { transform: scale(1.06); opacity: 1; }
        }

        .logo-img {
            width: 130px;
            height: 130px;
            object-fit: contain;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 20px rgba(108, 99, 255, 0.5));
            animation: logoFloat 4s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-8px); }
        }

        /* App name */
        .app-name {
            color: #ffffff;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 6px;
            background: linear-gradient(90deg, #ffffff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .app-tagline {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.78rem;
            font-weight: 300;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 48px;
        }

        /* Progress bar */
        .progress-track {
            width: 220px;
            height: 3px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 999px;
            overflow: hidden;
            margin-bottom: 18px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            border-radius: 999px;
            background: linear-gradient(90deg, #6c63ff, #2ed573);
            box-shadow: 0 0 10px rgba(108, 99, 255, 0.6);
            transition: width 0.1s linear;
        }

        /* Status text */
        .status-text {
            color: rgba(255, 255, 255, 0.35);
            font-size: 0.7rem;
            font-weight: 400;
            letter-spacing: 2px;
            text-transform: uppercase;
            min-height: 18px;
            transition: opacity 0.3s ease;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .logo-area { width: 120px; height: 120px; }
            .logo-img  { width: 95px; height: 95px; }
            .app-name  { font-size: 1.5rem; letter-spacing: 4px; }
            .progress-track { width: 170px; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
    <div class="grid-overlay"></div>

    <div class="loading-container">
        <div class="logo-area">
            <div class="ring-pulse-2"></div>
            <div class="ring-pulse"></div>
            <div class="ring-outer"></div>
            <img src="1000669890-Photoroom.png" alt="Kairos Logo" class="logo-img">
        </div>

        <div class="app-name">Kairos</div>
        <div class="app-tagline">Act at the right time</div>

        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="status-text" id="statusText">Initializing</div>
    </div>

    <script>
        const fill       = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');

        const steps = [
            { pct: 20,  label: 'Loading assets'    },
            { pct: 50,  label: 'Setting up'        },
            { pct: 75,  label: 'Almost ready'      },
            { pct: 95,  label: 'Finalizing'        },
            { pct: 100, label: 'Let\'s go!'        },
        ];

        let current = 0;
        const interval = setInterval(() => {
            if (current >= steps.length) { clearInterval(interval); return; }
            fill.style.width       = steps[current].pct + '%';
            statusText.textContent = steps[current].label;
            current++;
        }, 420);

        // Redirect logic
        const urlParams = new URLSearchParams(window.location.search);
        const target    = urlParams.get('target') || 'dashboard';

        function redirect() {
            if (target === 'login') {
                window.location.href = 'index.html';
            } else if (target === 'signup') {
                window.location.href = 'signup.html';
            } else if (target === 'signin') {
                window.location.href = 'signin.html';
            } else {
                const isLoggedIn = localStorage.getItem('isLoggedIn');
                const userName   = localStorage.getItem('userName');
                window.location.href = (isLoggedIn && userName) ? 'dashboard.html' : 'index.html';
            }
        }

        setTimeout(redirect, 2500);
        document.addEventListener('click', redirect);
    </script>
</body>
</html>
