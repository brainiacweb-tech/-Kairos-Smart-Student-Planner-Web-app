<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairos - Loading</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Stationary Doodle Background */
        .doodle-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            opacity: 0.08;
            z-index: 0;
        }

        .doodle-shape {
            position: absolute;
            opacity: 0.12;
        }

        .doodle-circle {
            width: 300px;
            height: 300px;
            border: 3px solid #6c63ff;
            border-radius: 50%;
            top: 5%;
            right: 10%;
        }

        .doodle-square {
            width: 150px;
            height: 150px;
            border: 3px solid #2ed573;
            bottom: 15%;
            left: 5%;
            transform: rotate(45deg);
        }

        .doodle-line {
            width: 400px;
            height: 3px;
            background: #6c63ff;
            top: 30%;
            left: -50px;
            transform: rotate(-25deg);
        }

        .doodle-dots {
            display: flex;
            gap: 15px;
            bottom: 10%;
            right: 15%;
        }

        .dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #2ed573;
            border: 2px solid #6c63ff;
        }

        .doodle-triangle {
            width: 0;
            height: 0;
            border-left: 75px solid transparent;
            border-right: 75px solid transparent;
            border-bottom: 130px solid #6c63ff;
            top: 60%;
            right: 5%;
        }

        /* Loading Container */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            position: relative;
        }

        /* Logo Animation */
        .logo-wrapper {
            position: relative;
            width: 180px;
            height: 180px;
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite;
        }

        .logo-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 10px 25px rgba(0, 0, 0, 0.2));
        }

        /* Animated Ring */
        .loading-ring {
            position: absolute;
            width: 200px;
            height: 200px;
            border: 4px solid rgba(255, 255, 255, 0.2);
            border-top: 4px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: spin 2s linear infinite;
            top: -10px;
            left: -10px;
        }

        /* Loading Text */
        .loading-text {
            color: #333;
            font-size: 1.2rem;
            font-weight: 600;
            text-align: center;
            margin-top: 20px;
            letter-spacing: 2px;
        }

        .loading-dots {
            display: inline-block;
            margin-left: 8px;
        }

        .loading-dots span {
            animation: blink 1.4s infinite;
            color: #6c63ff;
        }

        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        /* Tagline */
        .loading-tagline {
            color: #666;
            font-size: 0.95rem;
            font-style: italic;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }

        /* Animations */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes blink {
            0%, 20%, 50%, 80%, 100% { opacity: 1; }
            40% { opacity: 0.3; }
            60% { opacity: 0.3; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .logo-wrapper {
                width: 130px;
                height: 130px;
            }

            .loading-ring {
                width: 150px;
                height: 150px;
                top: -10px;
                left: -10px;
                border: 3px solid rgba(255, 255, 255, 0.2);
                border-top: 3px solid rgba(255, 255, 255, 0.8);
            }

            .loading-text {
                font-size: 1rem;
            }

            .doodle-circle { width: 200px; height: 200px; }
            .doodle-square { width: 100px; height: 100px; }
        }
    </style>
</head>
<body>
    <!-- Stationary Doodle Background -->
    <div class="doodle-bg">
        <div class="doodle-shape doodle-circle"></div>
        <div class="doodle-shape doodle-square"></div>
        <div class="doodle-shape doodle-line"></div>
        <div class="doodle-shape doodle-triangle"></div>
        <div class="doodle-shape doodle-dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
    </div>

    <!-- Loading Screen -->
    <div class="loading-container">
        <div class="logo-wrapper">
            <div class="loading-ring"></div>
            <img src="1000669890-Photoroom.png" alt="Kairos Logo" class="logo-img">
        </div>
        <div class="loading-text">
            Preparing
            <span class="loading-dots">
                <span>.</span>
                <span>.</span>
                <span>.</span>
            </span>
        </div>
        <p class="loading-tagline">Act at the right time</p>
    </div>

    <script>
        // Get target from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const target = urlParams.get('target') || 'dashboard';

        // Auto-redirect after 2.5 seconds
        setTimeout(() => {
            if (target === 'login') {
                window.location.href = 'index.html';
            } else if (target === 'signup') {
                window.location.href = 'signup.html';
            } else if (target === 'signin') {
                window.location.href = 'signin.html';
            } else {
                // Check if user is logged in
                const isLoggedIn = localStorage.getItem('isLoggedIn');
                const userName = localStorage.getItem('userName');
                
                if (isLoggedIn && userName) {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        }, 2500);

        // Allow user to skip loading by clicking
        document.addEventListener('click', () => {
            if (target === 'login') {
                window.location.href = 'index.html';
            } else if (target === 'signup') {
                window.location.href = 'signup.html';
            } else if (target === 'signin') {
                window.location.href = 'signin.html';
            } else {
                const isLoggedIn = localStorage.getItem('isLoggedIn');
                const userName = localStorage.getItem('userName');
                
                if (isLoggedIn && userName) {
                    window.location.href = 'dashboard.html';
                } else {
                    window.location.href = 'index.html';
                }
            }
        });
    </script>
</body>
</html>
