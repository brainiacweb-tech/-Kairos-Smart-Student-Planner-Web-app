<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairos - Planner</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages/dashboard.css">
    <link rel="stylesheet" href="css/pages/planner.css">
</head>
<body class="dark-mode">
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="sidebar-header" onclick="window.location.href='dashboard.html'"><div class="sidebar-logo-icon"><svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="logoGrad3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6C63FF;stop-opacity:1" /><stop offset="100%" style="stop-color:#4c3dd9;stop-opacity:1" /></linearGradient></defs><circle cx="50" cy="50" r="48" fill="url(#logoGrad3)" opacity="0.15"/><path d="M 35 30 L 65 30 L 70 50 L 65 70 L 35 70 L 30 50 Z" fill="none" stroke="#6C63FF" stroke-width="3" stroke-linejoin="round"/><circle cx="50" cy="50" r="8" fill="#6C63FF"/></svg></div><div class="sidebar-logo-text">Kairos</div></div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><span class="nav-icon"><i class="fas fa-chart-pie"></i></span><span class="nav-label">Dashboard</span></a>
                <a href="assignments.html" class="nav-item"><span class="nav-icon"><i class="fas fa-tasks"></i></span><span class="nav-label">Assignments</span></a>
                <a href="planner.html" class="nav-item active"><span class="nav-icon"><i class="fas fa-calendar"></i></span><span class="nav-label">Planner</span></a>
                <a href="timetable.html" class="nav-item"><span class="nav-icon"><i class="fas fa-table"></i></span><span class="nav-label">Timetable</span></a>
                <a href="analytics.html" class="nav-item"><span class="nav-icon"><i class="fas fa-chart-bar"></i></span><span class="nav-label">Analytics</span></a>
                <a href="gpa-calculator.html" class="nav-item"><span class="nav-icon"><i class="fas fa-calculator"></i></span><span class="nav-label">GPA Calc</span></a>
                <a href="cwa-to-gpa.html" class="nav-item"><span class="nav-icon"><i class="fas fa-exchange-alt"></i></span><span class="nav-label">CWA→GPA</span></a>
                <a href="lecture-tools.html" class="nav-item"><span class="nav-icon"><i class="fas fa-microphone"></i></span><span class="nav-label">Lecture Tools</span></a>
                <a href="pdf-tools.html" class="nav-item"><span class="nav-icon"><i class="fas fa-file-pdf"></i></span><span class="nav-label">PDF Tools</span></a>
                <a href="settings.html" class="nav-item"><span class="nav-icon"><i class="fas fa-cog"></i></span><span class="nav-label">Settings</span></a>
            </nav>
            <div class="sidebar-footer"><button class="nav-item" onclick="logout()"><span class="nav-icon"><i class="fas fa-sign-out-alt"></i></span><span class="nav-label">Logout</span></button></div>
        </aside>
        <div style="flex: 1; display: flex; flex-direction: column;">
            <nav class="navbar">
                <div class="navbar-left"><button class="navbar-toggle"><i class="fas fa-bars"></i></button><h1 class="navbar-title">Planner</h1></div>
                <div class="navbar-right"><button class="theme-toggle dark" onclick="toggleTheme()"></button><button class="btn-icon" onclick="openNotificationPanel()"><i class="fas fa-bell"></i><span class="notification-badge">0</span></button><div class="user-avatar">👤</div></div>
            </nav>
            <main class="main-content" style="max-width: 1400px; width: 100%;">
                <div class="planner-header">
                    <h1 class="planner-title">Weekly Planner</h1>
                    <div class="planner-actions">
                        <button class="btn btn-primary" onclick="generateStudyPlan()"><i class="fas fa-magic"></i> Generate Study Plan</button>
                    </div>
                </div>
                <div class="conflict-warning hidden" id="conflictWarning" style="display: none;">
                    <div class="conflict-warning-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <div class="conflict-warning-content">
                        <strong>Schedule Conflict Detected!</strong> You have overlapping events. Please adjust your schedule.
                    </div>
                </div>
                <div class="timetable">
                    <div class="timetable-container">
                        <div class="timetable-grid" id="timetableGrid">
                            <!-- Generated by JS -->
                        </div>
                    </div>
                </div>
                <div class="planner-legend">
                    <div class="legend-title">Legend</div>
                    <div class="legend-items">
                        <div class="legend-item"><div class="legend-color class"></div><span class="legend-label">Classes</span></div>
                        <div class="legend-item"><div class="legend-color study"></div><span class="legend-label">Study Time</span></div>
                        <div class="legend-item"><div class="legend-color personal"></div><span class="legend-label">Personal Time</span></div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <button class="fab" onclick="addTimeSlot()"><i class="fas fa-plus"></i></button>
    <div class="toast-container" id="toastContainer"></div>
    <script src="js/app.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/planner.js"></script>
</body>
</html>
