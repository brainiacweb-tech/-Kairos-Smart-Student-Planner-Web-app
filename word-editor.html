<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairos - Word Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; display: flex; flex-direction: column; background: white; }
        .editor-toolbar { background: white; border-bottom: 1px solid #ddd; padding: 8px 12px; display: flex; gap: 6px; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); flex-wrap: wrap; }
        .toolbar-btn { padding: 6px 10px; border: 1px solid #ddd; background: white; cursor: pointer; border-radius: 3px; font-size: 13px; transition: all 0.2s; white-space: nowrap; }
        .toolbar-btn:hover { background: #f5f5f5; }
        .separator { width: 1px; height: 20px; background: #ddd; margin: 0 3px; display: none; }
        .toolbar-menu { display: none; position: absolute; top: 45px; left: 12px; background: white; border: 1px solid #ddd; border-radius: 3px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); z-index: 1000; min-width: 160px; }
        .toolbar-menu.open { display: block; }
        .toolbar-menu button { display: block; width: 100%; text-align: left; padding: 8px 12px; border: none; background: none; cursor: pointer; font-size: 13px; }
        .toolbar-menu button:hover { background: #f5f5f5; }
        .toolbar-menu .sep { border-top: 1px solid #eee; margin: 3px 0; } 
        .hamburger { display: none; background: none; border: none; font-size: 16px; cursor: pointer; color: #333; }
        .editor-content { flex: 1; overflow: hidden; display: flex; background: white; }
        .editor-area { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 0; overflow-y: auto; }
        .page { background: white; width: 100%; max-width: 900px; min-height: 100%; padding: 30px 20px; box-shadow: none; overflow-y: auto; border-radius: 0; border-left: 1px solid #ddd; border-right: 1px solid #ddd; }
        #editor { width: 100%; border: none; outline: none; font-family: 'Calibri', serif; font-size: 14px; line-height: 1.6; color: #333; resize: none; }
        @media (max-width: 768px) {
            .editor-toolbar { padding: 10px; }
            .toolbar-btn { padding: 6px 10px; font-size: 12px; }
            .toolbar-btn span { display: none; }
            .toolbar-text { display: none; }
            .separator { display: none; }
            .hamburger { display: block; }
            .page { padding: 16px 12px; min-height: 600px; }
            #editor { font-size: 13px; }
        }
        @media (max-width: 480px) {
            body { height: 100vh; }
            .editor-toolbar { padding: 8px; }
            .toolbar-btn { padding: 6px 8px; font-size: 11px; }
            .page { padding: 12px; min-height: 400px; }
            #editor { font-size: 13px; line-height: 1.5; }
        }
    </style>
</head>
<body>
    <div class="editor-toolbar">
        <button class="hamburger" onclick="toggleToolMenu()"><i class="fas fa-bars"></i></button>
        <button class="toolbar-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i><span class="toolbar-text"> Dashboard</span></button>
        <div class="separator"></div>
        <button class="toolbar-btn" onclick="newDoc()" title="New"><i class="fas fa-file"></i></button>
        <button class="toolbar-btn" onclick="saveDoc()" title="Save"><i class="fas fa-save"></i></button>
        <button class="toolbar-btn" onclick="downloadDoc()" title="Download"><i class="fas fa-download"></i></button>
        <div class="separator"></div>
        <button class="toolbar-btn" onclick="formatCmd('bold')" title="Bold"><strong>B</strong></button>
        <button class="toolbar-btn" onclick="formatCmd('italic')" title="Italic"><em>I</em></button>
        <button class="toolbar-btn" onclick="formatCmd('underline')" title="Underline"><u>U</u></button>
        <div class="separator"></div>
        <select class="toolbar-btn" onchange="formatCmd('formatBlock', this.value); this.value='';" title="Styles">
            <option value="">Paragraph</option>
            <option value="h1">Heading 1</option>
            <option value="h2">Heading 2</option>
            <option value="h3">Heading 3</option>
        </select>
        <div id="toolMenu" class="toolbar-menu">
            <button onclick="goBack()"><i class="fas fa-arrow-left"></i> Dashboard</button>
            <button onclick="newDoc()"><i class="fas fa-file"></i> New</button>
            <button onclick="saveDoc()"><i class="fas fa-save"></i> Save</button>
            <button onclick="downloadDoc()"><i class="fas fa-download"></i> Download</button>
            <div class="sep"></div>
            <button onclick="formatCmd('bold')"><strong>B</strong> Bold</button>
            <button onclick="formatCmd('italic')"><em>I</em> Italic</button>
            <button onclick="formatCmd('underline')"><u>U</u> Underline</button>
            <div class="sep"></div>
            <button onclick="toggleToolMenu()"><i class="fas fa-times"></i> Close</button>
        </div>
    </div>
    
    <div class="editor-content">
        <div class="editor-area">
            <div class="page">
                <div id="editor" contenteditable="true">Type your document here...</div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        const editor = document.getElementById('editor');

        function toggleToolMenu() { 
            document.getElementById('toolMenu').classList.toggle('open'); 
        }

        function goBack() { window.location.href = 'dashboard.html'; }
        function newDoc() { if(confirm('Create new document?')) { editor.innerHTML = ''; toggleToolMenu(); } }
        function saveDoc() { localStorage.setItem('word_doc', editor.innerHTML); showToast('Saved!', 'success'); toggleToolMenu(); }
        function downloadDoc() { const blob = new Blob([editor.innerHTML], {type:'text/html'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'document.docx'; a.click(); toggleToolMenu(); }
        function formatCmd(cmd, val) { document.execCommand(cmd, false, val || null); editor.focus(); toggleToolMenu(); }

        window.addEventListener('load', () => {
            const saved = localStorage.getItem('word_doc');
            if (saved) editor.innerHTML = saved;
        });

        document.addEventListener('click', (e) => {
            const menu = document.getElementById('toolMenu');
            const hamburger = document.querySelector('.hamburger');
            if (!menu.contains(e.target) && !hamburger.contains(e.target)) {
                menu.classList.remove('open');
            }
        });
    </script>
</body>
</html>
