<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairos - PowerPoint Presentation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { height: 100vh; display: flex; background: #222; color: white; }
        .sidebar { width: 200px; background: #1a1a1a; border-right: 1px solid #333; overflow-y: auto; padding-top: 12px; }
        .slide-thumb { width: 160px; height: 90px; margin: 8px; background: white; border: 2px solid #555; border-radius: 4px; cursor: pointer; overflow: hidden; font-size: 12px; color: #333; display: flex; align-items: center; justify-content: center; padding: 4px; text-align: center; }
        .slide-thumb.active { border-color: #4CAF50; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .toolbar { background: #2a2a2a; border-bottom: 1px solid #333; padding: 12px 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .toolbar button { padding: 8px 12px; border: 1px solid #444; background: #333; color: white; cursor: pointer; border-radius: 4px; font-size: 14px; transition: all 0.2s; }
        .toolbar button:hover { background: #444; border-color: #666; }
        .separator { width: 1px; height: 24px; background: #444; margin: 0 4px; }
        .editor-area { flex: 1; display: flex; align-items: center; justify-content: center; overflow: auto; }
        .slide { width: 800px; height: 600px; background: white; color: #333; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); padding: 40px; display: flex; flex-direction: column; justify-content: space-between; }
        .slide h1 { font-size: 48px; font-weight: 700; margin-bottom: 20px; }
        .slide p { font-size: 24px; line-height: 1.6; }
        input { background: transparent; border: 1px solid #999; padding: 10px; border-radius: 4px; font-size: 16px; color: inherit; }
        input:focus { outline: 2px solid #4CAF50; background: #f9f9f9; }
        .slide input { color: #333; background: white; }
    </style>
</head>
<body>
    <!-- SLIDE THUMBNAILS PANEL -->
    <div class="sidebar">
        <div style="padding: 12px 8px; border-bottom: 1px solid #333; margin-bottom: 8px; font-size: 12px; font-weight: 600;">Slides</div>
        <div id="slideList"></div>
    </div>

    <!-- MAIN EDITOR -->
    <div class="main">
        <div class="toolbar">
            <button onclick="goBack()"><i class="fas fa-arrow-left"></i> Dashboard</button>
            <div class="separator"></div>
            <button onclick="newPresentation()" title="New"><i class="fas fa-file"></i></button>
            <button onclick="savePresentation()" title="Save"><i class="fas fa-save"></i></button>
            <button onclick="downloadPresentation()" title="Download"><i class="fas fa-download"></i></button>
            <div class="separator"></div>
            <button onclick="addSlide()" title="Add Slide"><i class="fas fa-plus"></i> Slide</button>
            <button onclick="deleteSlide()" title="Delete"><i class="fas fa-trash"></i></button>
        </div>

        <div class="editor-area">
            <div class="slide">
                <input type="text" id="slideTitle" placeholder="Slide Title">
                <textarea id="slideContent" placeholder="Slide content..." style="flex: 1; resize: none; padding: 16px; border: 1px solid #ddd; border-radius: 4px; font-size: 16px; font-family: inherit;"></textarea>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        let slides = [];
        let currentSlide = 0;

        function init() {
            slides = [{ title: 'Slide 1', content: 'Enter your content...' }];
            renderSlides();
            loadSlide(0);
        }

        function renderSlides() {
            const list = document.getElementById('slideList');
            list.innerHTML = '';
            slides.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'slide-thumb' + (i === currentSlide ? ' active' : '');
                div.textContent = s.title || `Slide ${i + 1}`;
                div.onclick = () => { saveSlide(); loadSlide(i); };
                list.appendChild(div);
            });
        }

        function loadSlide(i) {
            currentSlide = i;
            document.getElementById('slideTitle').value = slides[i].title;
            document.getElementById('slideContent').value = slides[i].content;
            renderSlides();
        }

        function saveSlide() {
            slides[currentSlide] = {
                title: document.getElementById('slideTitle').value,
                content: document.getElementById('slideContent').value
            };
        }

        function goBack() { window.location.href = 'dashboard.html'; }
        function newPresentation() { if (confirm('Create new presentation?')) { init(); } }
        function addSlide() { saveSlide(); slides.push({ title: `Slide ${slides.length + 1}`, content: '' }); loadSlide(slides.length - 1); }
        function deleteSlide() {
            if (slides.length > 1) {
                slides.splice(currentSlide, 1);
                loadSlide(Math.min(currentSlide, slides.length - 1));
            }
        }
        function savePresentation() { localStorage.setItem('ppt_presentation', JSON.stringify(slides)); showToast('Saved!', 'success'); }
        function downloadPresentation() {
            const text = slides.map((s, i) => `SLIDE ${i+1}\n${s.title}\n${s.content}\n\n---\n\n`).join('');
            const blob = new Blob([text], {type:'text/plain'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'presentation.txt';
            a.click();
        }

        window.addEventListener('load', () => {
            const saved = localStorage.getItem('ppt_presentation');
            if (saved) {
                try {
                    slides = JSON.parse(saved);
                    renderSlides();
                    loadSlide(0);
                } catch (e) {
                    init();
                }
            } else {
                init();
            }
        });
    </script>
</body>
</html>
