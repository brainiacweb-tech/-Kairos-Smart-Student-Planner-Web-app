<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kairos - Smart Student Planner | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/main.css?v=2">
    <link rel="stylesheet" href="css/components.css?v=2">
    <link rel="stylesheet" href="css/pages/auth.css?v=2">
    <script>
        // Show loading screen on app initialization
        if (!sessionStorage.getItem('loadingShown')) {
            sessionStorage.setItem('loadingShown', 'true');
            window.location.href = 'loading.html?target=login';
        }
    </script>
</head>
<body class="light-mode">
    <div class="auth-container">
        <div class="auth-bg">
            <div class="floating-shape shape-1"></div>
            <div class="floating-shape shape-2"></div>
            <div class="floating-shape shape-3"></div>
        </div>

        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="auth-logo-icon"><img src="1000669890-Photoroom.png" alt="Kairos Logo"></div>
                </div>
                <p class="auth-tagline">Act at the right time</p>
            </div>

            <div class="auth-header">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Manage your academic journey</p>
            </div>

            <form class="auth-form" id="loginForm">
                <div class="auth-form-group">
                    <label for="email">Email or Username</label>
                    <input type="text" id="email" name="email" placeholder="Enter your email or username" required>
                </div>

                <div class="auth-form-group">
                    <label for="password">Password (Optional)</label>
                    <div class="password-field-wrapper">
                        <input type="password" id="password" name="password" placeholder="Leave blank for guest access">
                        <button type="button" class="password-toggle-btn" onclick="togglePasswordVisibility('password')" title="Show/Hide password">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-checkbox">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember" style="margin: 0;">Remember me</label>
                </div>

                <div class="auth-actions">
                    <button type="submit" class="btn btn-primary btn-lg">Sign In</button>
                    <button type="button" class="btn btn-secondary btn-lg" onclick="loginAsGuest()">
                        <i class="fas fa-user-secret"></i> Continue as Guest
                    </button>
                </div>
            </form>

            <div class="auth-divider">Or continue with</div>

            <div class="oauth-buttons">
                <button type="button" class="oauth-btn oauth-google" title="Login with Google">
                    <svg class="oauth-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#EA4335" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#4285F4" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    <span class="oauth-text">Google</span>
                </button>
                <button type="button" class="oauth-btn oauth-microsoft" title="Login with Microsoft">
                    <svg class="oauth-logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1" y="1" width="9" height="9" fill="#F25022"/>
                        <rect x="12" y="1" width="11" height="9" fill="#7FBA00"/>
                        <rect x="1" y="12" width="9" height="11" fill="#00A4EF"/>
                        <rect x="12" y="12" width="11" height="11" fill="#FFB900"/>
                    </svg>
                    <span class="oauth-text">Microsoft</span>
                </button>
            </div>

            <div class="motivational-quote">
                <p id="dailyQuote">"The only way to do great work is to love what you do." - Steve Jobs</p>
            </div>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
                <p style="margin-top: var(--spacing-md);">
                    <a href="signin.html">Use Sign In Page</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/app.js?v=2"></script>
    <script>
        const GOOGLE_CLIENT_ID = '211537278617-ioagbmritu95qf9n2ce49h5gqqkcfri2.apps.googleusercontent.com';

        function decodeJwt(token) {
            try { return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
            catch(e) { return null; }
        }

        function handleGoogleCredential(response) {
            const payload = decodeJwt(response.credential);
            if (!payload) { showToast('Google sign-in failed', 'error'); return; }
            localStorage.setItem('kairos_user', JSON.stringify({
                email: payload.email,
                name: payload.name,
                avatarUrl: payload.picture,
                google_id: payload.sub,
                logged_in: true
            }));
            showToast('Welcome, ' + payload.name + '!', 'success');
            setTimeout(() => window.location.href = 'dashboard.html', 800);
        }

        window.addEventListener('load', () => {
            if (typeof google !== 'undefined') {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleCredential,
                    auto_select: false
                });
            }
        });

        document.querySelector('.oauth-google').addEventListener('click', () => {
            if (typeof google === 'undefined') { showToast('Google Sign-In not loaded yet, try again', 'warning'); return; }
            google.accounts.id.prompt((notification) => {
                if (notification.isSkippedMoment() || notification.isDismissedMoment()) {
                    // Fallback: render button in a temp container then click it
                    const tmp = document.createElement('div');
                    tmp.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:9999;background:#fff;padding:20px;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,0.2)';
                    tmp.innerHTML = '<p style="margin-bottom:12px;font-family:Inter,sans-serif;font-size:14px;text-align:center">Sign in with Google</p><div id="gBtnContainer"></div><button onclick="this.parentElement.remove()" style="margin-top:10px;width:100%;padding:8px;border:none;border-radius:8px;background:#f3f4f6;cursor:pointer;font-size:13px">Cancel</button>';
                    document.body.appendChild(tmp);
                    google.accounts.id.renderButton(document.getElementById('gBtnContainer'), { theme:'outline', size:'large', width:280 });
                }
            });
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email) {
                showToast('Please enter your email or username', 'error');
                return;
            }

            // Store user in localStorage
            localStorage.setItem('kairos_user', JSON.stringify({
                email: email,
                name: email.split('@')[0],
                logged_in: true
            }));

            showToast('Welcome back! Redirecting...', 'success');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        });

        function loginAsGuest() {
            localStorage.setItem('kairos_user', JSON.stringify({
                email: 'guest@kairos.local',
                name: 'Guest',
                logged_in: true,
                is_guest: true
            }));

            showToast('Welcome, Guest! Entering as guest...', 'info');
            setTimeout(() => {
                window.location.href = 'dashboard.html';
            }, 1000);
        }

        // Check if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('kairos_user') || '{}');
            if (user.logged_in) {
                window.location.href = 'dashboard.html';
            }
        });
    </script>
</body>
</html>
